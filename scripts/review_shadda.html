const tbody = document.getElementById('rows');
DATA.forEach((c, i) => {
  const tr = document.createElement('tr');
  tr.id = 'row' + i;
  tr.innerHTML = `<td><input type="checkbox" onchange="toggle(${i})"></td>
    <td class="word">${c.word}</td>
    <td class="vocal">${c.vocal}</td>
    <td class="sentence">${c.sentence}</td>`;
  tbody.appendChild(tr);
});
function toggle(i) {
  document.getElementById('row' + i).classList.toggle('checked');
  updateSummary();
}
function updateSummary() {
  const n = document.querySelectorAll('tr.checked').length;
  document.getElementById('summary').textContent = `المحدَّد: ${n} كلمة`;
}
function exportChecked() {
  const checked = [];
  document.querySelectorAll('tr.checked').forEach(tr => {
    const i = parseInt(tr.id.replace('row',''));
    checked.push(DATA[i].word);
  });
  const text = checked.join('\n');
  const blob = new Blob([text], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'shadda_selected.txt';
  a.click();
}
</script>
